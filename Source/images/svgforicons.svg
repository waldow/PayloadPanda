<svg id="the-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256">
                        <defs>
                            <!-- Background Gradients -->
                            <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#1A0B2E"></stop>
                                <stop offset="50%" stop-color="#0B0514"></stop>
                                <stop offset="100%" stop-color="#05020A"></stop>
                            </linearGradient>
                            <linearGradient id="glass-edge" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)"></stop>
                                <stop offset="40%" stop-color="rgba(255, 255, 255, 0.05)"></stop>
                                <stop offset="100%" stop-color="rgba(255, 255, 255, 0.0)"></stop>
                            </linearGradient>
                            <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
                                <stop offset="70%" stop-color="rgba(0,0,0,0)"></stop>
                                <stop offset="100%" stop-color="rgba(0,0,0,0.6)"></stop>
                            </radialGradient>

                            <!-- Element Gradients -->
                            <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FF007A"></stop>
                                <stop offset="100%" stop-color="#FF4D4D"></stop>
                            </linearGradient>
                            <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00F0FF"></stop>
                                <stop offset="100%" stop-color="#0057FF"></stop>
                            </linearGradient>
                            <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FFF200"></stop>
                                <stop offset="50%" stop-color="#FF007A"></stop>
                                <stop offset="100%" stop-color="#7928CA"></stop>
                            </linearGradient>

                            <!-- Glow Filter -->
                            <filter id="super-glow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur1"></feGaussianBlur>
                                <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"></feGaussianBlur>
                                <feMerge>
                                    <feMergeNode in="blur1"></feMergeNode>
                                    <feMergeNode in="blur2"></feMergeNode>
                                    <feMergeNode in="SourceGraphic"></feMergeNode>
                                </feMerge>
                            </filter>
                        </defs>

                        <!-- Base Squircle Shape -->
                        <rect width="512" height="512" rx="120" fill="url(#bg-grad)"></rect>
                        
                        <!-- Background Oscilloscope Waves (Fun/Data Vibe) -->
                        <path d="M -50 256 C 80 120, 170 120, 256 256 C 340 392, 430 392, 560 256" fill="none" stroke="rgba(255, 0, 122, 0.08)" stroke-width="6" stroke-linecap="round"></path>
                        <path d="M -50 256 C 80 392, 170 392, 256 256 C 340 120, 430 120, 560 256" fill="none" stroke="rgba(0, 240, 255, 0.08)" stroke-width="6" stroke-linecap="round"></path>

                        <!-- Center Tech Ring -->
                        <circle cx="256" cy="256" r="110" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" stroke-dasharray="12 12"></circle>

                        <!-- API Braces { } -->
                        <!-- Left Brace -->
                        <path d="M 150 130 C 110 130, 110 180, 110 210 C 110 230, 100 246, 80 256 C 100 266, 110 282, 110 302 C 110 332, 110 382, 150 382" fill="none" stroke="url(#pink-grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#super-glow)"></path>
                        
                        <!-- Right Brace -->
                        <path d="M 362 130 C 402 130, 402 180, 402 210 C 402 230, 412 246, 432 256 C 412 266, 402 282, 402 302 C 402 332, 402 382, 362 382" fill="none" stroke="url(#cyan-grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#super-glow)"></path>

                        <!-- Center Testing Thunderbolt -->
                        <path d="M 290 106 L 180 266 L 250 266 L 210 406 L 330 236 L 260 236 Z" fill="url(#bolt-grad)" stroke="url(#bolt-grad)" stroke-width="6" stroke-linejoin="round" filter="url(#super-glow)"></path>

                        <!-- Floating Energy Sparks -->
                        <circle cx="210" cy="160" r="5" fill="#FFF200" filter="url(#super-glow)"></circle>
                        <circle cx="310" cy="350" r="7" fill="#00F0FF" filter="url(#super-glow)"></circle>
                        <circle cx="170" cy="320" r="4" fill="#FF007A" filter="url(#super-glow)"></circle>
                        <circle cx="340" cy="180" r="4" fill="#FF007A" filter="url(#super-glow)"></circle>

                        <!-- Glassmorphism Bevel & Vignette -->
                        <rect width="512" height="512" rx="120" fill="url(#vignette)" pointer-events="none"></rect>
                        <rect width="510" height="510" x="1" y="1" rx="119" fill="none" stroke="url(#glass-edge)" stroke-width="2" pointer-events="none"></rect>
                    </svg>